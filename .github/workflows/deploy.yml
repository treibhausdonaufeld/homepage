name: Deploy to GitHub Pages

on:
  # Build & deploy on every push to the default branch
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress production deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # Installs dependencies, runs `astro build`, and uploads the
        # ./dist folder as a Pages artifact — all in one step.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
